<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <div class="header">
        <h1>Simple calculator</h1>
    </div>

    <div class="main">
        <div class="container">
            <div class="screen">
                <!--div class="last-operation"></div-->  
                <div class="current-operation"></div>              
            </div>
            <div class="options">
                <button id="clear">Clear</button>
                <button id="delete">Delete</button>
            </div>
            <div class="core">
                <div class="operands">
                    <button id="num-0">0</button>
                    <button id="point">.</button>
                    <button id="equal">=</button>
                    <button id="num-1">1</button>
                    <button id="num-2">2</button>
                    <button id="num-3">3</button>
                    <button id="num-4">4</button>
                    <button id="num-5">5</button>
                    <button id="num-6">6</button>
                    <button id="num-7">7</button>
                    <button id="num-8">8</button>
                    <button id="num-9">9</button>
                </div>
                <div class="operators">
                    <button id="add" class="operator">+</button>
                    <button id="subtract" class="operator">-</button>
                    <button id="divide" class="operator">/</button>
                    <button id="multiply" class="operator">&times;</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Calculator project</div>
</body>
</html>
